<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Language Converter</title>

    <style>
        :root {
            --bg1: #0f0c29;
            --bg2: #302b63;
            --bg3: #24243e;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #6c8cff;
            --success: #4ade80;
            --error: #fb7185;
        }

        * {
            box-sizing: border-box;
            font-family: "Poppins", system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .app {
            width: 95%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .panel {
            background: var(--glass);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            animation: slideUp .7s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        h2 {
            margin: 0 0 12px;
            font-weight: 600;
            text-align: center;
        }

        label {
            font-size: 13px;
            opacity: .85;
            display: block;
            margin-top: 12px;
        }

        input,
        textarea,
        select {
            width: 100%;
            margin-top: 6px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.25);
            color: #fff;
            outline: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
            min-height: 120px
        }

        .row {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }

        button {
            flex: 1;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #6c8cff, #8b5cf6);
            transition: .25s;
        }

        button:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 0, 0, .4);
        }

        button.ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: #c7d2fe;
        }

        .status {
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
        }

        .success {
            color: var(--success)
        }

        .error {
            color: var(--error)
        }

        @media(max-width:900px) {
            .app {
                grid-template-columns: 1fr
            }
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- ENCODE -->
        <div class="panel">
            <h2>🔐 Encode Message</h2>

            <label>Encoding Type</label>
            <select id="encodeType">
                <option value="vigenere">Vigenère + Base64</option>
                <option value="caesar">Caesar Cipher</option>
                <option value="ascii">ASCII Codes</option>
            </select>

            <label>Password / Key</label>
            <input id="encodeKey" placeholder="Password or shift number">

            <label>Your Message</label>
            <textarea id="plain"></textarea>

            <div class="row">
                <button onclick="encode()">Convert</button>
                <button class="ghost" onclick="plain.value=''">Clear</button>
            </div>

            <label>Secret Message</label>
            <textarea id="cipher" readonly></textarea>

            <div class="row">
                <button class="ghost" onclick="copy(cipher)">Copy</button>
                <button class="ghost" onclick="move()">Send → Decode</button>
            </div>

            <div id="encodeStatus" class="status"></div>
        </div>

        <!-- DECODE -->
        <div class="panel">
            <h2>🔓 Decode Message</h2>

            <label>Encoding Type</label>
            <select id="decodeType">
                <option value="vigenere">Vigenère + Base64</option>
                <option value="caesar">Caesar Cipher</option>
                <option value="ascii">ASCII Codes</option>
            </select>

            <label>Password / Key</label>
            <input id="decodeKey" placeholder="Same password / shift">

            <label>Secret Message</label>
            <textarea id="cipherIn"></textarea>

            <div class="row">
                <button onclick="decode()">Decode</button>
                <button class="ghost" onclick="cipherIn.value=''">Clear</button>
            </div>

            <label>Original Message</label>
            <textarea id="result" readonly></textarea>

            <div id="decodeStatus" class="status"></div>
        </div>
        <div>
            <a href="../index.html" style="color:aqua; text-decoration: none;">⬅ Back to Main Page</a>
        </div>
    </div>

    <script>
        const encStatus = document.getElementById("encodeStatus");
        const decStatus = document.getElementById("decodeStatus");

        const b64e = s => btoa(unescape(encodeURIComponent(s)));
        const b64d = s => decodeURIComponent(escape(atob(s)));

        function encode() {
            try {
                let t = plain.value;
                let k = encodeKey.value;
                let type = encodeType.value;
                if (!t) throw "Message missing";

                let out = "";
                if (type === "vigenere") {
                    if (!k) throw "Password required";
                    for (let i = 0; i < t.length; i++)
                        out += String.fromCharCode(t.charCodeAt(i) + k.charCodeAt(i % k.length));
                    out = b64e(out);
                }
                else if (type === "caesar") {
                    let s = +k || 0;
                    out = t.replace(/[a-z]/gi, c => {
                        let b = c <= 'Z' ? 65 : 97;
                        return String.fromCharCode((c.charCodeAt(0) - b + s) % 26 + b);
                    });
                }
                else {
                    out = [...t].map(c => c.charCodeAt(0)).join(" ");
                }
                cipher.value = out;
                encStatus.innerHTML = "<span class='success'>✔ Converted</span>";
            } catch (e) {
                encStatus.innerHTML = "<span class='error'>✖ " + e + "</span>";
            }
        }

        function decode() {
            try {
                let t = cipherIn.value;
                let k = decodeKey.value;
                let type = decodeType.value;
                if (!t) throw "Secret missing";

                let out = "";
                if (type === "vigenere") {
                    if (!k) throw "Password required";
                    t = b64d(t);
                    for (let i = 0; i < t.length; i++)
                        out += String.fromCharCode(t.charCodeAt(i) - k.charCodeAt(i % k.length));
                }
                else if (type === "caesar") {
                    let s = +k || 0;
                    out = t.replace(/[a-z]/gi, c => {
                        let b = c <= 'Z' ? 65 : 97;
                        return String.fromCharCode((c.charCodeAt(0) - b - s + 26) % 26 + b);
                    });
                }
                else {
                    out = t.split(/\s+/).map(n => String.fromCharCode(+n)).join("");
                }
                result.value = out;
                decStatus.innerHTML = "<span class='success'>✔ Decoded</span>";
            } catch (e) {
                decStatus.innerHTML = "<span class='error'>✖ Failed</span>";
            }
        }

        function copy(el) {
            navigator.clipboard.writeText(el.value);
            alert("Copied!");
        }
        function move() {
            cipherIn.value = cipher.value;
            decodeType.value = encodeType.value;
        }
    </script>

</body>

</html>
