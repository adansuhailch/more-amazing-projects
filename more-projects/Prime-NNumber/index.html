<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="../images/prime-number.png">
  <title>Prime Toolkit — Ultimate</title>

</head>

<body>
  <div class="card">
    <header>
      <div>
        <h1>Prime Toolkit — Ultimate</h1>
        <p class="muted">All prime & number utilities in one place</p>
      </div>
      <button id="theme" class="btn secondary">Toggle Theme</button>
    </header>

    <div class="grid">
      <!-- MAIN -->
      <div>
        <input id="num" type="number" placeholder="Enter a number">

        <div class="actions">
          <button class="btn" onclick="check()">Check</button>
          <button class="btn secondary" onclick="factors()">Factors</button>
          <button class="btn secondary" onclick="nextPrime()">Next</button>
          <button class="btn secondary" onclick="prevPrime()">Prev</button>
          <button class="btn secondary" onclick="listPrimes()">List ≤ N</button>
          <button class="btn secondary" onclick="countPrimes()">Count ≤ N</button>
          <button class="btn secondary" onclick="copy()">Copy</button>
        </div>

        <div id="result" class="result muted">Enter a number</div>
      </div>

      <!-- SIDE -->
      <div>
        <div class="panel">
          <strong>Extra Checks</strong>
          <div class="actions">
            <button class="btn secondary" onclick="pal()">Palindrome</button>
            <button class="btn secondary" onclick="perfect()">Perfect</button>
            <button class="btn secondary" onclick="arm()">Armstrong</button>
          </div>
        </div>

        <div class="panel">
          <strong>History</strong>
          <div id="history" class="list muted"></div>
        </div>
      </div>
    </div>
  </div>
<script src="script.js"></script>
</body>

</html>
