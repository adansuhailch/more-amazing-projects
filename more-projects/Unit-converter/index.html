<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="../images/Unit-converter.png">
  <title>Unit Converter — Adan</title>
</head>

<body>
  <header class="topbar">
    <div class="brand">Adan's Unit Converter</div>
    <div class="actions">
      <button id="themeToggle" class="btn small" aria-pressed="false">Light</button>
    </div>
  </header>

  <main class="container" id="mainContainer">
    <section class="panel">
      <h2>Convert Units</h2>

      <div class="row">
        <label for="category">Category</label>
        <select id="category" aria-label="Category">
          <option value="length">Length</option>
          <option value="temperature">Temperature</option>
          <option value="time">Time</option>
          <option value="speed">Speed</option>
        </select>
      </div>

      <div class="row double">
        <div>
          <label for="valueInput">Value</label>
          <input id="valueInput" type="number" step="any" placeholder="Enter value" inputmode="decimal" />
        </div>

        <div>
          <label for="fromUnit">From</label>
          <select id="fromUnit" aria-label="From unit"></select>
        </div>

        <div>
          <label for="toUnit">To</label>
          <select id="toUnit" aria-label="To unit"></select>
        </div>
      </div>

      <div class="row controls">
        <button id="convertButton" class="btn primary">Convert</button>
        <button id="copyButton" class="btn">Copy</button>
        <button id="clearButton" class="btn ghost">Clear</button>
      </div>

      <div id="result" class="result" aria-live="polite">—</div>

      <div id="explain" class="explain" aria-live="polite">
        <!-- contextual explanation appears here -->
      </div>
    </section>

    <aside class="panel small">
      <h3>Distance + Time → Speed</h3>
      <div class="row">
        <label for="dValue">Distance</label>
        <div class="inline-row">
          <input id="dValue" type="number" step="any" placeholder="e.g. 100">
          <select id="dUnit">
            <option value="m">meters (m)</option>
            <option value="km">kilometres (km)</option>
            <option value="mi">miles (mi)</option>
          </select>
        </div>
      </div>

      <div class="row">
        <label for="tValue">Time</label>
        <div class="inline-row">
          <input id="tValue" type="number" step="any" placeholder="e.g. 9.58">
          <select id="tUnit">
            <option value="s">seconds (s)</option>
            <option value="min">minutes (min)</option>
            <option value="h">hours (h)</option>
          </select>
        </div>
      </div>

      <div class="row controls">
        <button id="speedCalc" class="btn primary">Compute Speed</button>
        <button id="speedClear" class="btn ghost">Clear</button>
      </div>

      <div id="speedResult" class="result small">m/s — km/h — mph —</div>

      <div class="learn">
        <strong>Formula:</strong>
        <div>v = d ÷ t (speed = distance ÷ time)</div>
        <div><small>Example: d = 100 m, t = 9.58 s → v ≈ 10.44 m/s (≈ 37.6 km/h)</small></div>
      </div>
    </aside>
  </main>

  <footer class="footer">
    <div>© 2026 Adan · Educational Unit Converter</div>
  </footer>

  <script src="script.js"></script>
</body>

</html>
