<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Try to Grab Me</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/x-icon" href="../images/Carch-me.png">
    <link rel="stylesheet" href="../css/catch-me.css">
</head>

<body>

    <div class="box" id="escapeBox">Catch Me!</div>

    <script>
        const box = document.getElementById('escapeBox');

        function moveBox() {
            const vw = window.innerWidth;
            const vh = window.innerHeight;
            const boxSize = box.offsetWidth; // responsive size
            const padding = 20;

            const x = Math.random() * (vw - boxSize - padding);
            const y = Math.random() * (vh - boxSize - padding);

            box.style.left = `${x}px`;
            box.style.top = `${y}px`;
        }

        // Initial position
        moveBox();

        // Escape on hover (desktop) or touch (mobile)
        box.addEventListener('mouseenter', moveBox);
        box.addEventListener('touchstart', moveBox);

        // Recalculate on resize (important for mobile orientation change)
        window.addEventListener('resize', moveBox);
    </script>

</body>

</html>
